<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Docker Optimization Demo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">

    <header>
        <h1>🐳 Docker Optimization Demo</h1>
        <p class="subtitle">Spring Boot + MySQL + Thymeleaf</p>
        <nav>
            <a th:href="@{/}">홈</a>
            <a th:href="@{/items}">상품 목록</a>
            <a th:href="@{/items/new}">상품 등록</a>
            <a href="/actuator/health" target="_blank">Health Check</a>
        </nav>
    </header>

    <section class="dashboard">
        <h2>📊 현황</h2>
        <div class="stats">
            <div class="stat-card">
                <span class="stat-number" th:text="${totalItems}">0</span>
                <span class="stat-label">전체 상품</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" th:text="${totalQuantity}">0</span>
                <span class="stat-label">전체 재고</span>
            </div>
        </div>
    </section>

    <section class="recent">
        <h2>📦 상품 목록</h2>
        <div th:if="${#lists.isEmpty(recentItems)}" class="empty">
            <p>등록된 상품이 없습니다. <a th:href="@{/items/new}">상품을 등록해보세요.</a></p>
        </div>
        <table th:unless="${#lists.isEmpty(recentItems)}">
            <thead>
            <tr>
                <th>ID</th><th>상품명</th><th>가격</th><th>재고</th><th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${recentItems}">
                <td th:text="${item.id}"></td>
                <td><a th:href="@{/items/{id}(id=${item.id})}" th:text="${item.name}"></a></td>
                <td th:text="${#numbers.formatInteger(item.price, 1, 'COMMA') + '원'}"></td>
                <td th:text="${item.quantity + '개'}"></td>
                <td><a th:href="@{/items/{id}/edit(id=${item.id})}" class="btn-edit">수정</a></td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="deploy-info">
        <h2>🚀 배포 정보</h2>
        <ul>
            <li>서버 시간: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span></li>
            <li>Java 버전: <span th:text="${@environment.getProperty('java.version')}"></span></li>
            <li>Profile: <span th:text="${@environment.getProperty('spring.profiles.active') ?: 'default'}"></span></li>
        </ul>
    </section>

</div>
</body>
</html>
