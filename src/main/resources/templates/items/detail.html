<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 상세</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">

    <header>
        <h1>🐳 Docker Optimization Demo</h1>
        <nav>
            <a th:href="@{/static}">홈</a>
            <a th:href="@{/templates/items}">상품 목록</a>
            <a th:href="@{/items/new}">상품 등록</a>
            <a href="/actuator/health" target="_blank">Health Check</a>
        </nav>
    </header>

    <div th:if="${message}" class="alert alert-success">
        <span th:text="${message}"></span>
    </div>

    <section class="detail">
        <h2>📦 상품 상세</h2>
        <div class="detail-card">
            <div class="detail-row">
                <span class="detail-label">ID</span>
                <span class="detail-value" th:text="${item.id}"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">상품명</span>
                <span class="detail-value" th:text="${item.name}"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">설명</span>
                <span class="detail-value" th:text="${item.description ?: '설명 없음'}"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">가격</span>
                <span class="detail-value" th:text="${#numbers.formatInteger(item.price, 1, 'COMMA') + '원'}"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">재고</span>
                <span class="detail-value">
                    <span th:class="${item.quantity == 0 ? 'badge-danger' : 'badge-success'}"
                          th:text="${item.quantity + '개'}"></span>
                </span>
            </div>
        </div>
        <div class="actions">
            <a th:href="@{/items/{id}/edit(id=${item.id})}" class="btn-primary">수정</a>
            <form th:action="@{/items/{id}/delete(id=${item.id})}" method="post"
                  onsubmit="return confirm('삭제하시겠습니까?')">
                <button type="submit" class="btn-delete">삭제</button>
            </form>
            <a th:href="@{/templates/items}" class="btn-secondary">목록으로</a>
        </div>
    </section>

</div>
</body>
</html>
