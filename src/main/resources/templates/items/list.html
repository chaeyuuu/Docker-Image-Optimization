<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 목록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">

    <header>
        <h1>🐳 Docker Optimization Demo</h1>
        <nav>
            <a th:href="@{/}">홈</a>
            <a th:href="@{/items}">상품 목록</a>
            <a th:href="@{/items/new}">상품 등록</a>
            <a href="/actuator/health" target="_blank">Health Check</a>
        </nav>
    </header>

    <section>
        <div class="section-header">
            <h2>📦 상품 목록</h2>
            <a th:href="@{/items/new}" class="btn-primary">+ 상품 등록</a>
        </div>

        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>

        <form th:action="@{/items}" method="get" class="search-form">
            <input type="text" name="search" th:value="${search}" placeholder="상품명 검색...">
            <button type="submit">검색</button>
            <a th:href="@{/items}" class="btn-reset">초기화</a>
        </form>

        <div class="stats-mini">
            <span>전체: <strong th:text="${totalCount}">0</strong>개</span>
            <span>총 재고: <strong th:text="${totalQuantity}">0</strong>개</span>
        </div>

        <div th:if="${#lists.isEmpty(items)}" class="empty">
            <p>상품이 없습니다.</p>
        </div>

        <table th:unless="${#lists.isEmpty(items)}">
            <thead>
            <tr>
                <th>ID</th><th>상품명</th><th>설명</th><th>가격</th><th>재고</th><th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.id}"></td>
                <td><a th:href="@{/items/{id}(id=${item.id})}" th:text="${item.name}"></a></td>
                <td th:text="${item.description ?: '-'}"></td>
                <td th:text="${#numbers.formatInteger(item.price, 1, 'COMMA') + '원'}"></td>
                <td>
                        <span th:class="${item.quantity == 0 ? 'badge-danger' : 'badge-success'}"
                              th:text="${item.quantity + '개'}"></span>
                </td>
                <td class="actions">
                    <a th:href="@{/items/{id}/edit(id=${item.id})}" class="btn-edit">수정</a>
                    <form th:action="@{/items/{id}/delete(id=${item.id})}" method="post"
                          onsubmit="return confirm('삭제하시겠습니까?')">
                        <button type="submit" class="btn-delete">삭제</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

</div>
</body>
</html>
