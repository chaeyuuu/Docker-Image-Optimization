<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 폼</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">

    <header>
        <h1>🐳 Docker Optimization Demo</h1>
        <nav>
            <a th:href="@{/static}">홈</a>
            <a th:href="@{/templates/items}">상품 목록</a>
            <a th:href="@{/items/new}">상품 등록</a>
            <a href="/actuator/health" target="_blank">Health Check</a>
        </nav>
    </header>

    <section>
        <h2 th:text="${item.id != null ? '✏️ 상품 수정' : '➕ 상품 등록'}">상품 폼</h2>

        <form th:action="${item.id != null ? '/items/' + item.id + '/edit' : '/items/new'}"
              th:object="${item}" method="post" class="item-form">

            <div class="form-group">
                <label for="name">상품명 *</label>
                <input type="text" id="name" th:field="*{name}" placeholder="상품명을 입력하세요">
                <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </div>

            <div class="form-group">
                <label for="description">설명</label>
                <textarea id="description" th:field="*{description}"
                          placeholder="상품 설명을 입력하세요" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="price">가격 (원) *</label>
                <input type="number" id="price" th:field="*{price}" placeholder="0" min="0">
                <span class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
            </div>

            <div class="form-group">
                <label for="quantity">재고 수량 *</label>
                <input type="number" id="quantity" th:field="*{quantity}" placeholder="0" min="0">
                <span class="error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary"
                        th:text="${item.id != null ? '수정 완료' : '등록 완료'}">저장</button>
                <a th:href="@{/templates/items}" class="btn-secondary">취소</a>
            </div>
        </form>
    </section>

</div>
</body>
</html>
